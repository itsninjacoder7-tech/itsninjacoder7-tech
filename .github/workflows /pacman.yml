name: generate pacman contribution graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout repo (important)
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Step 2: Generate Pacman graph
      - name: Generate pacman graph
        uses: Platane/snk@v3
        with:
          github_user_name: itsninjacoder7-tech
          outputs: |
            dist/pacman-contribution-graph.svg?animation=pacman
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&animation=pacman

      # ✅ Step 3: Push to output branch
      - name: Push pacman graph
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
